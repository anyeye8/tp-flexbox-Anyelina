<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio de Flexbox 1</title>
    <style>
        main{
            /*  width: 90%;
            height: 100dvh; */
            display: flex;
            flex-flow: row nowrap; 
            align-items: center;
            justify-content: space-between;
            
        }
        div{
            justify-content: center;
            background-color: rgb(123, 198, 199,0.8);
            width: 500px;
            height: 13px;
            align-content: center;
            border: solid 1px white;
            font-family: sans-serif;
            padding: 13px;
        }
    </style>
</head>
<body>
    <main>
        <div>Home</div>
        <div>Servicios</div>
        <div>Opciones</div>
        <div>Planes</div>
        <div>Contacto</div>
    </main>
</body>
</html>
