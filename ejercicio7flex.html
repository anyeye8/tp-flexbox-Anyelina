<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio de Flexbox 7 </title>
    <style>
        .card{
            display: flex;
            flex-direction: column;
            width: 400px;
            height: 300px;
           box-shadow: 0px  0px 7px 0px lightgrey;
            border: 0;
            font-family: sans-serif;
        }
        .title{
            display: flex;
            flex: 1;
            background: black;
            color: white;
            align-items: center;
            justify-content: center;
        }
        .contenido{
            flex: 4;
            padding: 8px;
        }
        h4{
            padding: 0;
        }
        .footer{
            display: flex;
            flex: 1;
            background: darkgrey;
            color: white;
            align-items: center;
            justify-content: center;

        }
    </style>
</head>
<body>
    <div class="card">
        <div class="title"><h2>Tarjeta de Presentación</h2></div>
        <div class="contenido">Contenido del cuerpo de la tarjeta</div>
        <div class="footer"><h4>Pie de la tarjeta</h4></div>
</body>
</html>
